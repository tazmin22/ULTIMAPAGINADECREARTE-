<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;700;900&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Kaushan+Script&display=swap"
        rel="stylesheet">
    <!-- UIkit -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uikit@3.19.4/dist/css/uikit.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/uikit@3.19.4/dist/js/uikit.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/uikit@3.19.4/dist/js/uikit-icons.min.js"></script>

    <!-- Lenis Smooth Scroll -->

    <link rel="stylesheet" href="responsive.css">
    <link rel="stylesheet" href="nav-footer.css">
    <style>
        :root {
            --paper: #fbf9f4;
            --wine: #6a1a1c;
            --orange: #e65c00;
            --text: #111;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box !important;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            max-width: 100vw;
            overflow-x: hidden !important;
            background-color: var(--paper);
            color: var(--text);
            font-family: 'EB Garamond', serif;
            animation: fadeInPage 1.2s ease-out;
        }

        @keyframes fadeInPage {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        /* ===== NAV (Unified with Puertas al Mundo) ===== */
        .t-nav {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 45px 0;
            background: transparent;
            border-bottom: none;
            backdrop-filter: none;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .floating-logo {
            position: absolute;
            top: 30px;
            left: 5%;
            z-index: 2100;
            transition: all 0.4s ease;
        }

        .floating-logo img {
            height: 110px;
            width: auto;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            filter: drop-shadow(0 4px 10px rgba(0, 0, 0, 0.2));
        }

        .t-nav-links {
            display: flex;
            gap: 4.5rem;
        }

        .t-nav-links a {
            font-family: 'Inter', sans-serif;
            font-size: 0.72rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #fff;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            opacity: 0.9;
        }

        .t-nav-links a:hover {
            opacity: 1;
            color: var(--orange) !important;
        }

        /* ===== STRIP HERO (From Puertas al Mundo) ===== */
        .strip-wrapper {
            display: flex;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: #000;
            position: relative;
        }

        .strip-overlay-content {
            position: absolute;
            bottom: 10%;
            left: 8%;
            z-index: 50;
            pointer-events: none;
        }

        .gallery-title-block {
            display: inline-block;
            background: var(--wine);
            padding: 12px 35px;
            color: #fff;
            transform: rotate(-1.5deg);
            box-shadow: 6px 6px 25px rgba(0, 0, 0, 0.15);
            margin-bottom: 5px;
        }

        .gallery-title-block h2 {
            font-family: 'Inter', sans-serif;
            font-weight: 900;
            font-size: clamp(2rem, 5vw, 3.8rem);
            text-transform: uppercase;
            margin: 0;
            line-height: 1;
            letter-spacing: 2px;
        }

        .gallery-title-block.accent {
            transform: rotate(2deg) translateY(-8px) translateX(30px);
            background: var(--wine);
            padding: 8px 30px;
        }

        .gallery-title-block.accent h3 {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-weight: 400;
            font-size: clamp(2rem, 5vw, 3.8rem);
            margin: 0;
            line-height: 1;
            text-transform: none;
        }

        .strip {
            position: relative;
            flex: 1;
            height: 100%;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.7s cubic-bezier(0.23, 1, 0.32, 1);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            background-size: cover;
            background-position: center;
        }

        /* Images for the gallery */
        .strip:nth-child(1) {
            background-image: url('./img/footerfoter.webp');
        }

        .strip:nth-child(2) {
            background-image: url('./img/Acrilico.webp');
        }

        .strip:nth-child(3) {
            background-image: url('./img/bodegonimg.webp');
        }

        .strip:nth-child(4) {
            background-image: url('./img/cicloimg.webp');
        }

        .strip:nth-child(5) {
            background-image: url('./img/Antonio Mora. Mujer con sombrero. 0,89 x 0,70. Oleo- 2006.jpg');
        }

        .strip:last-child {
            border-right: none;
        }

        .strip:hover {
            flex: 4;
        }

        @media (max-width: 768px) {
            .strip-wrapper {
                flex-direction: column;
            }

            .strip {
                border-right: none;
                border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            }

            .strip:hover {
                flex: 3;
            }
        }

        /* ===== GALLERY SECTION GRID ===== */
        .gallery-container {
            max-width: 1500px;
            margin: 0 auto;
            padding: 0 20px 100px;
        }

        .gallery-grid {
            column-count: 4;
            column-gap: 16px;
        }

        .gallery-item {
            break-inside: avoid;
            margin: 0 0 16px;
            border-radius: 18px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.72);
            box-shadow: 0 14px 34px rgba(0, 0, 0, 0.08);
            transition: transform 0.35s ease, box-shadow 0.35s ease;
        }

        .gallery-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 18px 44px rgba(0, 0, 0, 0.12);
        }

        .gallery-item a {
            display: block;
        }

        .gallery-img {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.45s ease;
        }

        .uk-lightbox-caption {
            display: none !important;
        }

        .gallery-item:hover .gallery-img {
            transform: scale(1.015);
        }

        @media (max-width: 1200px) {
            .gallery-grid {
                column-count: 3;
            }
        }

        @media (max-width: 860px) {
            .gallery-grid {
                column-count: 2;
            }

            .gallery-container {
                padding-top: 20px;
            }
        }

        @media (max-width: 560px) {
            .gallery-grid {
                column-count: 1;
            }

            .gallery-container {
                padding-left: 14px;
                padding-right: 14px;
            }
        }
    </style>
</head>

<body>

    <nav class="t-nav">

            <a href="talleres.html">Talleres</a>

        <div class="strip-overlay-content"

            <div class="gallery-title-block"

    <script src="./galeria-list.js"></script>
    <script>
        const galleryFiles = Array.isArray(window.GALERIA_FILES) ? window.GALERIA_FILES : [];
        const galleryGrid = document.getElementById('gallery-grid');
        const stripExtension = (name) => name
            .replace(/\.webp$/i, '')
            .replace(/\.(jpg|jpeg|png)$/i, '')
            .replace(/[_-]+/g, ' ')
            .replace(/\s+/g, ' ')
            .trim();

        if (galleryGrid) {
            const fragment = document.createDocumentFragment();

            galleryFiles.forEach((file) => {
                const item = document.createElement('div');
                item.className = 'gallery-item';

                const link = document.createElement('a');
                const imagePath = encodeURI(`./talleres/${file}`);
                const caption = stripExtension(file);

                link.href = imagePath;

                const image = document.createElement('img');
                image.className = 'gallery-img';
                image.src = imagePath;
                image.alt = caption;
                image.loading = 'lazy';
                image.decoding = 'async';

                link.appendChild(image);
                item.appendChild(link);
                fragment.appendChild(item);
            });

            galleryGrid.appendChild(fragment);
        }
    </script>
    <script>
        const lenis = new Lenis({
            duration: 1.5,
            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
            smoothWheel: true,
        });

        function raf(time) {
            lenis.raf(time);
            requestAnimationFrame(raf);
        }
        requestAnimationFrame(raf);

        // Animation for Footer Donation
        const footerDonation = document.querySelector('.footer-donation');
        const observerOptions = { threshold: 0.1 };

        const footerObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, observerOptions);

        if (footerDonation) footerObserver.observe(footerDonation);
    </script>
    <script src="script.js"></script>
